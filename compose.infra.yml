name: myscrollr-test

services:
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: myscrollr_test
      POSTGRES_USER: myscrollr_test
      POSTGRES_PASSWORD: myscrollr_test
    volumes:
      - test-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myscrollr_test -d myscrollr_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  test-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mock-stripe:
    image: stripe/stripe-mock:v0.182.0
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:12111 || exit 0"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  test-postgres-data:
