name: Desktop Cache Warm

# Warms the sccache compilation cache on `main` so that tag-triggered
# desktop releases can restore it. GitHub Actions cache scoping only
# allows tag workflows to read caches from the default branch — not
# from other tags. This workflow populates the cache on `main`.
#
# Runs the full `cargo build --release` (same as a real release) so
# sccache entries match exactly. The frontend must be built first
# because tauri_build::build() expects the dist/ directory.

on:
  push:
    branches: [main]
    paths:
      - "desktop/src-tauri/**"
      - "!desktop/src-tauri/icons/**"
      - "!desktop/src-tauri/capabilities/**"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  SCCACHE_GHA_ENABLED: "false"

jobs:
  warm-cache:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - platform: macos-latest
            rust_target: aarch64-apple-darwin

    runs-on: ${{ matrix.platform }}

    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            extension/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set sccache cache path
        id: sccache-path
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=$LOCALAPPDATA/Mozilla/sccache" >> "$GITHUB_OUTPUT"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "path=$HOME/Library/Caches/Mozilla.sccache" >> "$GITHUB_OUTPUT"
          else
            echo "path=$HOME/.cache/sccache" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.sccache-path.outputs.path }}
          key: sccache-${{ matrix.rust_target }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ matrix.rust_target }}-

      - name: Prepare extension
        run: npm ci
        working-directory: extension

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Cargo build (populate sccache)
        working-directory: desktop/src-tauri
        env:
          RUSTC_WRAPPER: sccache
        run: cargo build --release --target ${{ matrix.rust_target }}

      - name: Show sccache stats
        run: sccache --show-stats
        working-directory: .
