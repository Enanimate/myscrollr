name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

env:
  # sccache-action v0.0.9 still uses Node 20 internally
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Use sccache local disk storage (NOT the GHA backend). The local
  # cache dir is saved/restored via actions/cache, which allows tag
  # workflows to read caches from the default branch (main).
  SCCACHE_GHA_ENABLED: "false"

jobs:
  # ── Resolve the build matrix based on the selected platform ────
  # Tag pushes and "all" both build every target. Selecting a single
  # platform produces a one-entry matrix so only that runner spins up.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has-linux: ${{ steps.set.outputs.has_linux }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          case "$PLATFORM" in
            windows)
              echo 'matrix={"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            macos)
              echo 'matrix={"include":[{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=false" >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"},{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              echo "has_linux=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Determine the release tag (shared across all jobs) ─────────
  resolve-tag:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(jq -r .version desktop/src-tauri/tauri.conf.json)
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="desktop-v${VERSION}-dev.${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

  # ── Build ──────────────────────────────────────────────────────
  build:
    needs: [matrix-setup, resolve-tag]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    env:
      RUSTC_WRAPPER: sccache
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            extension/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      # sccache wraps rustc to cache individual compilation units.
      # We use local disk storage (not the GHA backend) combined with
      # actions/cache so that tag-triggered builds can read caches
      # from the default branch (main), where desktop-cache.yml warms them.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Set sccache cache path
        id: sccache-path
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            echo "path=$LOCALAPPDATA/Mozilla/sccache" >> "$GITHUB_OUTPUT"
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "path=$HOME/Library/Caches/Mozilla.sccache" >> "$GITHUB_OUTPUT"
          else
            echo "path=$HOME/.cache/sccache" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore sccache cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.sccache-path.outputs.path }}
          key: sccache-${{ matrix.rust_target }}-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: |
            sccache-${{ matrix.rust_target }}-

      - name: Prepare extension (generates .wxt/tsconfig.json needed by shared components)
        run: npm ci
        working-directory: extension

      - name: Install frontend dependencies
        run: npm ci

      # tauri-action builds, signs updater artifacts, creates/updates
      # the GitHub release, and assembles latest.json across all platforms.
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: desktop
          tauriScript: npx tauri
          tagName: ${{ needs.resolve-tag.outputs.tag }}
          releaseName: "Scrollr ${{ needs.resolve-tag.outputs.tag }}"
          releaseBody: "See the [full changelog](https://github.com/brandon-relentnet/myscrollr/commits/${{ needs.resolve-tag.outputs.tag }}) for details."
          releaseDraft: false
          prerelease: false

      - name: Show sccache stats
        run: sccache --show-stats
        working-directory: .

      # ── Fix AppImage for rolling-release distros ───────────────
      # Bundled Ubuntu 22.04 libwayland-* are ABI-incompatible with
      # newer Mesa on Arch, Fedora, etc. We repackage without them,
      # then replace the release asset so direct downloads get the fix.
      - name: Fix AppImage for rolling-release distros
        if: matrix.platform == 'ubuntu-22.04'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract
            rm -f squashfs-root/usr/lib/libwayland-*.so.*
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "$APPIMAGE"
            rm -rf squashfs-root appimagetool-x86_64.AppImage

            # Replace the release asset with the patched AppImage
            TAG="${{ needs.resolve-tag.outputs.tag }}"
            gh release upload "$TAG" "$APPIMAGE" --clobber --repo "$GITHUB_REPOSITORY"
          fi

  # ── Re-sign the repackaged AppImage ────────────────────────────
  # The libwayland fix above replaces the AppImage binary on the
  # release, invalidating the original signature from tauri-action.
  # This job runs AFTER all builds complete (so latest.json is fully
  # assembled), re-signs the patched AppImage, and patches both the
  # .sig asset and the signature entries in latest.json.
  #
  # Uses !cancelled() so it runs even if macOS or Windows builds fail
  # — the Linux AppImage still needs its signature fixed.
  fix-appimage-signature:
    needs: [matrix-setup, build, resolve-tag]
    if: ${{ !cancelled() && needs.build.result != 'skipped' && needs.matrix-setup.outputs.has-linux == 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Re-sign AppImage and patch latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: |
          TAG="${{ needs.resolve-tag.outputs.tag }}"

          # Download the repackaged AppImage from the release
          gh release download "$TAG" --pattern '*.AppImage' -D /tmp --repo "$GITHUB_REPOSITORY"
          APPIMAGE=$(find /tmp -name '*.AppImage' | head -1)

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found on release, skipping"
            exit 0
          fi

          # Re-sign with the Tauri signer
          npx --yes @tauri-apps/cli signer sign -k "$TAURI_SIGNING_PRIVATE_KEY" "$APPIMAGE"

          # Upload the new .sig, replacing the stale one
          gh release upload "$TAG" "$APPIMAGE.sig" --clobber --repo "$GITHUB_REPOSITORY"

          # Patch latest.json with the new signature
          NEW_SIG=$(cat "$APPIMAGE.sig")
          gh release download "$TAG" --pattern 'latest.json' -D /tmp --repo "$GITHUB_REPOSITORY"

          jq --arg sig "$NEW_SIG" '
            .platforms["linux-x86_64"].signature = $sig |
            .platforms["linux-x86_64-appimage"].signature = $sig
          ' /tmp/latest.json > /tmp/latest_patched.json

          mv /tmp/latest_patched.json /tmp/latest.json
          gh release upload "$TAG" /tmp/latest.json --clobber --repo "$GITHUB_REPOSITORY"

          echo "AppImage re-signed and latest.json patched successfully"
