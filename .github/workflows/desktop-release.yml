name: Desktop Release

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Target platform(s)"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - windows
          - macos
          - linux
      release:
        description: "Create a GitHub release"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  # ── Resolve the build matrix based on the selected platform ────
  # Tag pushes and "all" both build every target. Selecting a single
  # platform produces a one-entry matrix so only that runner spins up.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        run: |
          PLATFORM="${{ inputs.platform || 'all' }}"
          case "$PLATFORM" in
            windows)
              echo 'matrix={"include":[{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"}]}' >> "$GITHUB_OUTPUT"
              ;;
            macos)
              echo 'matrix={"include":[{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
            linux)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"}]}' >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo 'matrix={"include":[{"platform":"ubuntu-22.04","rust_target":"x86_64-unknown-linux-gnu"},{"platform":"windows-latest","rust_target":"x86_64-pc-windows-msvc"},{"platform":"macos-latest","rust_target":"aarch64-apple-darwin"}]}' >> "$GITHUB_OUTPUT"
              ;;
          esac

  # ── Build ──────────────────────────────────────────────────────
  build:
    needs: matrix-setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.matrix-setup.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            desktop/package-lock.json
            extension/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri
          cache-on-failure: true

      - name: Prepare extension (generates .wxt/tsconfig.json needed by shared components)
        run: npm ci
        working-directory: extension

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tauriScript: npx tauri

      - name: Fix AppImage for rolling-release distros
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          APPIMAGE=$(find src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          if [ -n "$APPIMAGE" ]; then
            chmod +x "$APPIMAGE"
            "$APPIMAGE" --appimage-extract
            # Bundled Ubuntu 22.04 libwayland-* are ABI-incompatible with newer
            # Mesa on Arch, Fedora, etc., causing "Could not create default EGL
            # display: EGL_BAD_PARAMETER". System Wayland libs always match the
            # system GPU drivers, so these should never be bundled.
            rm -f squashfs-root/usr/lib/libwayland-*.so.*
            wget -q https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
            chmod +x appimagetool-x86_64.AppImage
            ARCH=x86_64 ./appimagetool-x86_64.AppImage --appimage-extract-and-run squashfs-root "$APPIMAGE"
            rm -rf squashfs-root appimagetool-x86_64.AppImage
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: scrollr-${{ matrix.rust_target }}
          path: |
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/nsis/*.exe
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: ignore

  # ── Release ────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release)
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for git log

      - name: Determine release tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            VERSION=$(jq -r .version desktop/src-tauri/tauri.conf.json)
            SHORT_SHA=$(git rev-parse --short HEAD)
            TAG="desktop-v${VERSION}-dev.${SHORT_SHA}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${{ steps.tag.outputs.tag }}"

          # Find the previous desktop-v* tag (skip the current one)
          PREV_TAG=$(git tag --list 'desktop-v*' --sort=-version:refname \
            | grep -v "^${TAG}$" | head -1)

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            COMPARE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV_TAG}...${GITHUB_SHA}"
          else
            # First release — use full history
            RANGE="HEAD"
            COMPARE_URL=""
          fi

          # Collect commits that touched desktop/ or extension/ (shared components)
          FIXES=""
          FEATURES=""
          OTHER=""

          while IFS='|' read -r HASH SUBJECT; do
            [ -z "$HASH" ] && continue
            LINE="- ${SUBJECT} (\`${HASH}\`)"
            case "$SUBJECT" in
              fix*)     FIXES="${FIXES}${LINE}"$'\n' ;;
              feat*)    FEATURES="${FEATURES}${LINE}"$'\n' ;;
              *)        OTHER="${OTHER}${LINE}"$'\n' ;;
            esac
          done < <(git log "$RANGE" --pretty=format:"%h|%s" -- desktop/ extension/)

          # Assemble the body
          BODY="## What's Changed"$'\n\n'

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Features"$'\n'"${FEATURES}"$'\n'
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Fixes"$'\n'"${FIXES}"$'\n'
          fi
          if [ -n "$OTHER" ]; then
            BODY="${BODY}### Other"$'\n'"${OTHER}"$'\n'
          fi

          if [ -z "$FEATURES" ] && [ -z "$FIXES" ] && [ -z "$OTHER" ]; then
            BODY="${BODY}_No desktop-specific changes found._"$'\n'
          fi

          if [ -n "$COMPARE_URL" ]; then
            BODY="${BODY}"$'\n'"**Full diff**: ${COMPARE_URL}"
          fi

          # Write to file (avoids escaping issues with multiline strings)
          echo "$BODY" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' -o -name '*.exe' -o -name '*.msi' -o -name '*.dmg' \) -exec cp {} release/ \;
          ls -lh release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Scrollr ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: true
          body_path: /tmp/release-notes.md
          files: release/*
