services:
  mock-twelvedata:
    build:
      context: ./twelvedata
      dockerfile: Dockerfile
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9002/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      default:
        aliases:
          - mock-twelvedata
