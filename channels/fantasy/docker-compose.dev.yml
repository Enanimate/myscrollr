version: "3.8"

services:
  scrollr-fantasy-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - CHANNEL_URL=https://fantasy.api.myscrollr.enanimate.dev
      - COOLIFY_FQDN=fantasy.api.myscrollr.enanimate.dev
      - YAHOO_CLIENT_ID=${YAHOO_CLIENT_ID:-test_yahoo_client_id}
      - YAHOO_CLIENT_SECRET=${YAHOO_CLIENT_SECRET:-test_yahoo_client_secret}
      - YAHOO_CALLBACK_URL=https://core.api.myscrollr.enanimate.dev/yahoo/callback
      - YAHOO_API_BASE_URL=http://mock-yahoo:9005
      - YAHOO_TOKEN_URL=http://mock-yahoo:9005/oauth2/get_token
      - YAHOO_AUTH_URL=http://mock-yahoo:9005/oauth2/request_auth
      - FRONTEND_URL=https://myscrollr.enanimate.dev
      - SYNC_ENABLED=${SYNC_ENABLED:-false}
      - SYNC_INTERVAL_SECS=${SYNC_INTERVAL_SECS:-120}
      - SYNC_CONCURRENCY=${SYNC_CONCURRENCY:-40}
    restart: unless-stopped
